spring:
  profiles:
    # 本地默认 dev；staging/prod 通过环境变量 SPRING_PROFILES_ACTIVE 注入
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 210MB

server:
  port: ${SERVER_PORT:8080}

# 应用版本：health 接口与 CI 可读取；生产建议注入 APP_VERSION
info:
  app:
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

shuyuan:
  jwt:
    secret: shuyuan-dev-jwt-secret-change-in-prod
    expire-days: 7
    admin-expire-hours: 8
  wx:
    dev-mode: true
    appid: ${WX_APPID:}
    secret: ${WX_SECRET:}
    wxacode-cache-max-entries: 64
    wxacode-cache-ttl-seconds: 3600
  login:
    max-fail-attempts: 5
    lock-minutes: 5
    fail-window-minutes: 15
  rate-limit:
    enabled: true
    login-per-minute: 10
    wx-login-per-minute: 20
    admin-login-per-minute: 10
    enroll-per-minute: 5
    ai-per-day: 20
    wxacode-per-minute: 30
  ai:
    provider: ${AI_PROVIDER:fallback}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    model: ${AI_MODEL:glm-4-flash}
    daily-limit: 20
    max-chunks: 5
  subscribe:
    enroll-success-template-id: ${WX_TMPL_ENROLL_SUCCESS:}
    enroll-approved-template-id: ${WX_TMPL_ENROLL_APPROVED:}
    activity-remind-template-id: ${WX_TMPL_ACTIVITY_REMIND:}
  alert:
    enabled: ${ALERT_ENABLED:false}
    webhook-url: ${ALERT_WEBHOOK_URL:}
    window-minutes: ${ALERT_WINDOW_MINUTES:5}
    error-rate-percent: ${ALERT_ERROR_RATE_PERCENT:1}
    min-sample-size: ${ALERT_MIN_SAMPLE_SIZE:20}
    cooldown-minutes: ${ALERT_COOLDOWN_MINUTES:15}
  cors:
    allowed-origin-patterns: []
  security:
    trust-forwarded-headers: false
  asr:
    provider: ${ASR_PROVIDER:none}
    access-key-id: ${ASR_ACCESS_KEY_ID:}
    access-key-secret: ${ASR_ACCESS_KEY_SECRET:}
    app-key: ${ASR_APP_KEY:}
    region: ${ASR_REGION:cn-shanghai}
  oss:
    enabled: ${OSS_ENABLED:false}
    endpoint: ${OSS_ENDPOINT:}
    bucket: ${OSS_BUCKET:}
    access-key: ${OSS_ACCESS_KEY:}
    secret-key: ${OSS_SECRET_KEY:}
    cdn-domain: ${OSS_CDN_DOMAIN:}
    sign-expire-seconds: ${OSS_SIGN_EXPIRE_SECONDS:7200}
    max-upload-bytes: ${OSS_MAX_UPLOAD_BYTES:209715200}

mybatis-plus:
  configuration:
    # 数据库字段下划线自动转 Java 驼峰命名
    map-underscore-to-camel-case: true
    # SQL 日志由各 profile 单独配置（dev 开启，staging/prod 关闭）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %X{traceId} %logger{36} - %msg%n"

# Actuator 仅内部使用，不对外暴露 /actuator 端点（health 走 /api/v1/health）
management:
  endpoints:
    web:
      exposure:
        include: none
  endpoint:
    health:
      show-details: never

# OpenAPI（dev/staging 默认开启；prod 在 profile 中关闭）
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
  show-actuator: false