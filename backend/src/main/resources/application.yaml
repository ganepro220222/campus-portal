spring:
  profiles:
    active: dev

server:
  port: 8080

shuyuan:
  jwt:
    secret: shuyuan-dev-jwt-secret-change-in-prod
    expire-days: 7
  wx:
    dev-mode: true

mybatis-plus:
  configuration:
    # 数据库字段下划线自动转Java驼峰命名
    map-underscore-to-camel-case: true
    # 开发阶段打印SQL语句
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除配置
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0