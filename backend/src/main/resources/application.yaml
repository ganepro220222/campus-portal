spring:
  profiles:
    # 本地默认 dev；staging/prod 通过环境变量 SPRING_PROFILES_ACTIVE 注入
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

# 应用版本：health 接口与 CI 可读取；生产建议注入 APP_VERSION
info:
  app:
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

shuyuan:
  jwt:
    secret: shuyuan-dev-jwt-secret-change-in-prod
    expire-days: 7
  wx:
    dev-mode: true
  login:
    max-fail-attempts: 5
    lock-minutes: 5
    fail-window-minutes: 15

mybatis-plus:
  configuration:
    # 数据库字段下划线自动转 Java 驼峰命名
    map-underscore-to-camel-case: true
    # SQL 日志由各 profile 单独配置（dev 开启，staging/prod 关闭）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %X{traceId} %logger{36} - %msg%n"

# Actuator 仅内部使用，不对外暴露 /actuator 端点（health 走 /api/v1/health）
management:
  endpoints:
    web:
      exposure:
        include: none
  endpoint:
    health:
      show-details: never