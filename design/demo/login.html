<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>云端书院 · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#2B356E; --navy-deep:#1E2654; --navy-ink:#141A38;
  --blue:#3F57B5; --blue-soft:#5C72C9;
  --sky:#D0E7F7; --sky-2:#E8F2FB; --sky-3:#F2F7FC;
  --paper:#F5F8FC; --card:#FFFFFF;
  --gold:#BE9C44; --gold-soft:#E7D9AE; --gold-line:#D8C79A;
  --ink:#1F2547; --sub:#5A648A; --muted:#8A93B2; --line:#E7ECF6;
  --shadow:0 10px 30px rgba(31,40,90,.10);
  --shadow-sm:0 4px 14px rgba(31,40,90,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:
    radial-gradient(1200px 600px at 50% -10%, #E9EFFA 0%, transparent 60%),
    repeating-linear-gradient(45deg, #EEF2FA 0 2px, transparent 2px 26px),
    #E4EAF5;
  display:flex; justify-content:center; align-items:center;
  min-height:100vh; padding:22px;
}
.serif{font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;}
.eng{font-family:"Cormorant Garamond","Noto Serif SC",serif; letter-spacing:.06em;}

.phone{
  width:392px; height:846px; background:#0c1024;
  border-radius:52px; padding:13px;
  box-shadow:0 30px 70px rgba(20,26,56,.45), 0 4px 0 #2a2f4d inset;
  position:relative;
}
.screen{
  width:100%; height:100%; background:var(--paper);
  border-radius:40px; overflow:hidden; position:relative;
  display:flex; flex-direction:column;
}
.notch{position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:128px; height:32px; background:#0c1024;
  border-bottom-left-radius:18px; border-bottom-right-radius:18px; z-index:1000;}
.statusbar{height:46px; flex:0 0 46px; display:flex; align-items:center;
  justify-content:space-between; padding:0 30px; font-size:14px; font-weight:700;
  color:var(--ink); position:relative; z-index:60;}
.statusbar.light{color:#fff;}
.statusbar .time{position:absolute; left:50%; transform:translateX(-50%);}
.statusbar .right{display:flex; gap:6px; align-items:center;}
.statusbar svg{display:block;}

.view{flex:1; overflow-y:auto; overflow-x:hidden; position:relative;}
.view::-webkit-scrollbar{display:none;}

/* 进入动画 */
@keyframes appear{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
.fade-in{animation:appear .5s ease both;}
body.leaving .phone{animation:leave .42s ease forwards;}
@keyframes leave{to{opacity:0; transform:scale(.985);}}

/* 通用按钮 */
.btn{height:52px; border:none; border-radius:15px; font-size:16px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .15s, box-shadow .2s, opacity .2s; width:100%;}
.btn:active{transform:scale(.975);}
.btn-primary{background:linear-gradient(135deg,#fff,#F3F6FF); color:var(--navy);
  box-shadow:0 8px 20px rgba(255,255,255,.18);}
.btn-gold{background:linear-gradient(135deg,#CDA94E,#B58A2F); color:#fff;
  box-shadow:0 8px 22px rgba(150,110,30,.35);}
.btn-ghost{background:rgba(255,255,255,.10); color:#fff;
  border:1px solid rgba(255,255,255,.28);}

/* 导航栏 */
.navbar{height:52px; flex:0 0 52px; display:flex; align-items:center; padding:0 12px;
  background:var(--card); position:sticky; top:0; z-index:40;
  border-bottom:1px solid var(--line);}
.nav-back{width:38px; height:38px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; cursor:pointer; color:var(--ink);}
.nav-back:active{background:var(--sky-3);}
.nav-title{flex:1; text-align:center; font-size:17px; font-weight:700; color:var(--ink);
  margin-right:38px;}

/* 底部 tab */
.tabbar{height:62px; flex:0 0 62px; background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px); border-top:1px solid var(--line);
  display:flex; justify-content:space-around; align-items:center; z-index:50;}
.tab{display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer;
  color:var(--muted); flex:1; padding:4px 0; transition:color .2s;}
.tab.active{color:var(--navy);}
.tab svg{width:23px; height:23px;}
.tab span{font-size:10.5px; font-weight:600;}

/* toast */
.toast{position:absolute; left:50%; bottom:96px; transform:translateX(-50%) translateY(12px);
  background:rgba(20,26,56,.92); color:#fff; padding:11px 20px; border-radius:24px;
  font-size:13px; opacity:0; pointer-events:none; transition:.3s; z-index:2000; max-width:80%;
  text-align:center;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* AI 助手浮标 + 抽屉 */
.ai-fab{position:absolute; right:16px; bottom:78px; width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg,#3F57B5,#2B356E); box-shadow:0 10px 24px rgba(43,53,110,.42);
  display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:55;
  border:2px solid rgba(255,255,255,.5);}
.ai-fab svg{width:26px; height:26px; color:#fff;}
.ai-fab .pulse{position:absolute; inset:-2px; border-radius:50%; border:2px solid rgba(190,156,68,.6);
  animation:pulse 2.2s infinite;}
@keyframes pulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.4);opacity:0}100%{opacity:0}}
.ai-badge{position:absolute; top:-4px; right:-4px; background:var(--gold); color:#fff;
  font-size:9px; font-weight:700; padding:2px 6px; border-radius:10px; border:1.5px solid #fff;}
.mask{position:absolute; inset:0; background:rgba(15,20,46,.45); opacity:0; pointer-events:none;
  transition:.3s; z-index:80;}
.mask.show{opacity:1; pointer-events:auto;}
.sheet{position:absolute; left:0; right:0; bottom:0; background:var(--card);
  border-radius:22px 22px 0 0; transform:translateY(100%); transition:.36s cubic-bezier(.32,.72,0,1);
  z-index:90; max-height:78%; display:flex; flex-direction:column;}
.sheet.show{transform:translateY(0);}
.sheet-head{padding:16px 18px 10px; border-bottom:1px solid var(--line); display:flex;
  align-items:center; gap:10px;}
.sheet-head .avt{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3F57B5,#2B356E);
  display:flex;align-items:center;justify-content:center;}
.sheet-head .avt svg{width:20px;height:20px;color:#fff;}
.sheet-title{font-weight:700; color:var(--ink); font-size:15px;}
.sheet-sub{font-size:11px; color:var(--muted);}
.sheet-body{padding:14px 16px; overflow-y:auto; gap:12px; display:flex; flex-direction:column;}
.bubble{max-width:80%; padding:11px 14px; border-radius:14px; font-size:13.5px; line-height:1.6;}
.bubble.ai{background:var(--sky-3); color:var(--ink); border-top-left-radius:4px; align-self:flex-start;
  border:1px solid var(--line);}
.bubble.me{background:linear-gradient(135deg,#3F57B5,#2B356E); color:#fff; border-top-right-radius:4px;
  align-self:flex-end;}
.chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:2px;}
.chip{font-size:12px; padding:7px 12px; border-radius:16px; background:#fff; color:var(--navy);
  border:1px solid var(--sky); cursor:pointer;}
.chip:active{background:var(--sky-3);}
.sheet-input{display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--line);}
.sheet-input input{flex:1; height:42px; border:1px solid var(--line); border-radius:21px;
  padding:0 16px; font-size:14px; outline:none; background:var(--paper);}
.sheet-input .send{width:42px; height:42px; border-radius:50%; border:none;
  background:linear-gradient(135deg,#3F57B5,#2B356E); color:#fff; cursor:pointer; flex:0 0 42px;
  display:flex; align-items:center; justify-content:center;}

.login{height:100%; position:relative; overflow:hidden;
  background:
    radial-gradient(120% 80% at 50% 8%, #0E1430 0%, #1A2150 38%, #2B356E 78%, #313C7C 100%);
}
.login .glow{position:absolute; top:60px; left:50%; transform:translateX(-50%);
  width:360px; height:360px; border-radius:50%;
  background:radial-gradient(circle, rgba(208,231,247,.30) 0%, rgba(208,231,247,0) 65%);
  filter:blur(6px); pointer-events:none;}
.login .stars{position:absolute; inset:0; background-image:
  radial-gradient(1.4px 1.4px at 20% 22%, rgba(255,255,255,.55), transparent),
  radial-gradient(1.2px 1.2px at 70% 16%, rgba(255,255,255,.45), transparent),
  radial-gradient(1.6px 1.6px at 84% 30%, rgba(255,255,255,.5), transparent),
  radial-gradient(1.1px 1.1px at 35% 12%, rgba(255,255,255,.4), transparent);
  opacity:.7;}
.login-inner{position:relative; z-index:2; height:100%; display:flex; flex-direction:column;
  align-items:center; padding:38px 36px 30px;}
.seal{width:148px; height:148px; border-radius:50%; margin-top:30px; position:relative;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle,#0b0f24 0%,#11152e 70%); 
  box-shadow:0 0 0 1px rgba(190,156,68,.55), 0 0 46px rgba(120,150,220,.45),
    0 0 0 9px rgba(255,255,255,.04);}
.seal::after{content:""; position:absolute; inset:-7px; border-radius:50%;
  border:1px solid rgba(190,156,68,.35);}
.seal img{width:138px; height:138px; border-radius:50%; object-fit:cover;}
.brand{margin-top:26px; text-align:center;}
.brand .zh{color:#fff; font-size:32px; font-weight:700; letter-spacing:.32em;
  text-indent:.32em; text-shadow:0 2px 18px rgba(0,0,0,.35);}
.brand .div{width:128px; height:0; margin:14px auto 13px; position:relative;}
.brand .div::before{content:""; position:absolute; left:0; right:0; top:50%;
  height:1px; background:linear-gradient(90deg,transparent,rgba(190,156,68,.85),transparent);}
.brand .div::after{content:"❖"; position:absolute; left:50%; top:50%;
  transform:translate(-50%,-52%); color:var(--gold); font-size:12px;
  background:transparent; padding:0 8px;}
.brand .sub{color:rgba(214,224,248,.92); font-size:13.5px; letter-spacing:.14em;}
.brand .en{color:rgba(170,184,224,.7); font-size:11px; margin-top:5px; letter-spacing:.04em;}
.login-form{width:100%; margin-top:auto;}
.field{position:relative; margin-bottom:14px;}
.field svg{position:absolute; left:16px; top:50%; transform:translateY(-50%);
  width:18px; height:18px; color:rgba(214,224,248,.65);}
.field input{width:100%; height:52px; background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18); border-radius:15px; padding:0 16px 0 46px;
  color:#fff; font-size:15px; outline:none; transition:.2s;
  backdrop-filter:blur(6px);}
.field input::placeholder{color:rgba(214,224,248,.55);}
.field input:focus{background:rgba(255,255,255,.17); border-color:rgba(190,156,68,.6);}
.divider{display:flex; align-items:center; gap:14px; margin:22px 2px;
  color:rgba(214,224,248,.55); font-size:12px;}
.divider::before,.divider::after{content:""; flex:1; height:1px; background:rgba(255,255,255,.16);}
.foot{margin-top:22px; text-align:center; color:rgba(170,184,224,.6); font-size:11px;
  letter-spacing:.08em; line-height:1.7;}
.foot b{color:rgba(214,224,248,.85); font-weight:600;}
.wave{position:absolute; left:0; right:0; bottom:0; z-index:1; opacity:.16;}

/* —— 校徽白底徽章 + 登录页微调 —— */
.seal{background:#FFFFFF; width:158px; height:158px;
  box-shadow:0 0 0 1px rgba(190,156,68,.55), 0 16px 44px rgba(8,12,30,.50), 0 0 42px rgba(150,180,235,.40);}
.seal::after{border:1px solid rgba(190,156,68,.55);}
.seal img{width:144px; height:144px; object-fit:contain;}
.login{background:radial-gradient(120% 88% at 50% 12%, #233362 0%, #273667 42%, #2B356E 80%, #36427C 100%);}
.login .glow{background:radial-gradient(circle, rgba(208,231,247,.22) 0%, rgba(208,231,247,0) 66%);}
</style>
</head><body>
