<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>立体鉴赏</title>
<link rel="icon" href="data:," />
<style>
  :root { --gold:#c8a86a; --ink:#0f1118; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body,#app { width:100%; height:100%; overflow:hidden; background:var(--ink); color:#eef0f5;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif; }
  #app { position:fixed; inset:0; }
  #scene { position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  [hidden] { display:none !important; }

  /* 顶栏 */
  .topbar { position:absolute; left:0; right:0; top:0; z-index:5; pointer-events:none;
    padding:calc(env(safe-area-inset-top) + 16px) 20px 40px;
    background:linear-gradient(180deg, rgba(6,8,14,.72), rgba(6,8,14,0)); }
  .topbar-name { font-size:19px; font-weight:700; letter-spacing:1px; text-shadow:0 2px 12px rgba(0,0,0,.55); }
  .topbar-sub { margin-top:5px; font-size:12.5px; color:rgba(230,234,245,.72); max-width:80%;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .lang { position:absolute; top:calc(env(safe-area-inset-top) + 16px); right:16px; z-index:6; pointer-events:auto;
    display:flex; border:1px solid rgba(255,255,255,.22); border-radius:999px; overflow:hidden; font-size:12px; }
  .lang button { appearance:none; border:0; background:transparent; color:rgba(238,240,245,.7); padding:5px 12px; cursor:pointer; }
  .lang button.on { background:rgba(200,168,106,.22); color:#f4e6c8; }

  /* 提示 */
  .hint { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) translateY(66px);
    padding:8px 18px; border-radius:999px; background:rgba(0,0,0,.5); backdrop-filter:blur(6px);
    font-size:12.5px; letter-spacing:1px; color:rgba(255,255,255,.86); z-index:6; pointer-events:none;
    opacity:0; transition:opacity .5s; }
  .hint.show { opacity:1; }

  /* 热点标记 */
  .hs-layer { position:absolute; inset:0; z-index:4; pointer-events:none; }
  .hs { position:absolute; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer;
    width:26px; height:26px; will-change:transform,opacity; transition:opacity .25s; }
  .hs::before { content:""; position:absolute; inset:8px; border-radius:50%; background:var(--gold);
    box-shadow:0 0 0 4px rgba(200,168,106,.28); }
  .hs::after { content:""; position:absolute; inset:8px; border-radius:50%; border:1px solid var(--gold);
    animation:pulse 2s ease-out infinite; }
  .hs.active::before { background:#fff; box-shadow:0 0 0 5px rgba(255,255,255,.35); }
  @keyframes pulse { 0%{transform:scale(1);opacity:.9} 100%{transform:scale(2.6);opacity:0} }
  @media (prefers-reduced-motion:reduce){ .hs::after{ animation:none } }

  /* 底部工具条 */
  .hud { position:absolute; left:0; right:0; bottom:0; z-index:7;
    padding:34px 14px calc(env(safe-area-inset-bottom) + 16px);
    background:linear-gradient(0deg, rgba(6,8,14,.8), rgba(6,8,14,0));
    display:flex; flex-direction:column; gap:12px; align-items:center; }
  .presets { display:flex; gap:9px; }
  .preset { appearance:none; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06);
    color:rgba(238,240,245,.82); font-size:12px; padding:5px 15px; border-radius:999px; cursor:pointer; transition:.2s; }
  .preset.on { border-color:var(--gold); background:rgba(200,168,106,.2); color:#f4e6c8; }
  .actions { display:flex; gap:10px; }
  .btn { appearance:none; display:inline-flex; align-items:center; justify-content:center; gap:6px;
    height:44px; min-width:64px; padding:0 14px; border:1px solid rgba(255,255,255,.16); border-radius:14px;
    background:rgba(255,255,255,.08); backdrop-filter:blur(10px); color:#eef0f5; font-size:13px; cursor:pointer; transition:.18s; }
  .btn:active { transform:scale(.96); }
  .btn.on { border-color:var(--gold); background:rgba(200,168,106,.2); color:#f4e6c8; }
  .btn .ic { font-size:16px; line-height:1; }

  /* 讲解卡片 / 抽屉 */
  .card { position:absolute; z-index:8; background:rgba(20,22,32,.92); backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.1); color:#eef0f5; opacity:0; pointer-events:none; transition:.28s; }
  .card.show { opacity:1; pointer-events:auto; }
  .card-title { font-size:16px; font-weight:700; color:#f4e6c8; margin-bottom:8px; letter-spacing:.5px; }
  .card-body { font-size:13.5px; line-height:1.75; color:rgba(238,240,245,.9); }
  .card-close { position:absolute; top:12px; right:14px; font-size:20px; color:rgba(255,255,255,.6); cursor:pointer; line-height:1; }
  /* PC：右侧栏 */
  @media (min-width:721px){ .card { top:50%; right:26px; transform:translateY(-50%) translateX(20px);
      width:300px; padding:22px 24px; border-radius:18px; } .card.show{ transform:translateY(-50%) translateX(0);} }
  /* 移动：底部抽屉 */
  @media (max-width:720px){ .card { left:0; right:0; bottom:0; transform:translateY(24px);
      padding:20px 22px calc(env(safe-area-inset-bottom) + 22px); border-radius:22px 22px 0 0; }
      .card.show{ transform:translateY(0);} }

  /* 遮罩：加载 / 错误 */
  .overlay { position:absolute; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 90% at 50% 40%, #1c2030 0%, #0b0d14 100%); transition:opacity .45s; }
  .overlay.fade { opacity:0; }
  .poster { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0;
    transform:scale(1.06); filter:blur(3px) brightness(.5); }
  .poster.on { opacity:1; }
  .ov-inner { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:15px; padding:0 32px; text-align:center; }
  .spin { width:38px; height:38px; border-radius:50%; border:3px solid rgba(255,255,255,.16); border-top-color:var(--gold); animation:spin .9s linear infinite; }
  @keyframes spin { to{ transform:rotate(360deg) } }
  .ov-text { font-size:13px; letter-spacing:1px; color:rgba(238,240,245,.86); text-shadow:0 1px 8px rgba(0,0,0,.6); }
  .bar { width:180px; height:4px; border-radius:2px; background:rgba(255,255,255,.14); overflow:hidden; }
  .bar>i { display:block; width:0; height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold),#e6cf9a); transition:width .25s; }
  .err-ic { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:700; color:#0b0d14; background:var(--gold); }
  .err-btn { margin-top:4px; padding:9px 24px; border:1px solid var(--gold); border-radius:999px; background:transparent; color:#f4e6c8; font-size:13px; cursor:pointer; }

  /* 编辑面板（?mode=edit） */
  .editor { position:absolute; top:0; right:0; bottom:0; width:300px; z-index:20; overflow-y:auto;
    background:rgba(14,16,24,.95); border-left:1px solid rgba(255,255,255,.1); padding:16px; font-size:12.5px; }
  .editor h3 { font-size:13px; color:var(--gold); margin:14px 0 8px; letter-spacing:.5px; }
  .editor h3:first-child { margin-top:0; }
  .ed-row { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:7px 0; color:#cfd3e0; }
  .ed-row input[type=range]{ flex:1; }
  .ed-note { color:#8a90a6; line-height:1.6; margin:6px 0; }
  .ed-btn { width:100%; margin-top:6px; padding:9px; border:1px solid var(--gold); border-radius:8px;
    background:transparent; color:#f4e6c8; cursor:pointer; font-size:12.5px; }
  .ed-badge { position:absolute; top:12px; left:12px; z-index:20; background:rgba(200,168,106,.9); color:#0b0d14;
    font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <header class="topbar" hidden id="topbar">
    <div class="topbar-name" id="c-name"></div>
    <div class="topbar-sub" id="c-sub"></div>
  </header>
  <div class="lang" hidden id="lang"><button data-l="zh" class="on">中文</button><button data-l="en">EN</button></div>

  <div class="hint" id="hint">拖动旋转 · 双指缩放</div>
  <div class="hs-layer" id="hs-layer"></div>

  <div class="hud" hidden id="hud">
    <div class="presets" id="presets"></div>
    <div class="actions" id="actions"></div>
  </div>

  <div class="card" id="card">
    <span class="card-close" id="card-close">×</span>
    <div class="card-title" id="card-title"></div>
    <div class="card-body" id="card-body"></div>
  </div>

  <div class="overlay" id="loading">
    <div class="poster" id="poster"></div>
    <div class="ov-inner">
      <div class="spin"></div>
      <div class="ov-text" id="load-text">正在加载…</div>
      <div class="bar"><i id="bar"></i></div>
    </div>
  </div>
  <div class="overlay error" hidden id="error">
    <div class="ov-inner">
      <div class="err-ic">!</div>
      <div class="ov-text" id="err-text">加载失败</div>
      <button class="err-btn" id="err-btn" hidden>重新加载</button>
    </div>
  </div>

  <div class="editor" hidden id="editor"></div>
  <div class="ed-badge" hidden id="ed-badge">编辑模式</div>
</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/addons/" } }
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js'

const $ = id => document.getElementById(id)
const editMode = new URLSearchParams(location.search).get('mode') === 'edit'
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches
let lang = 'zh'
let cfg, renderer, scene, camera, controls, model
let hotspots = [], activePreset = null, raf = 0
const initialCam = new THREE.Vector3()
const tmp = new THREE.Vector3()

const t = o => (o && (o[lang] || o.zh || o.en)) || {}

function showError(msg, retry) {
  $('loading').setAttribute('hidden','')
  $('err-text').textContent = msg
  $('err-btn').toggleAttribute('hidden', !retry)
  $('error').removeAttribute('hidden')
}
const num = (v,d) => (typeof v === 'number' && isFinite(v)) ? v : d

function initRenderer() {
  try {
    renderer = new THREE.WebGLRenderer({ canvas:$('scene'), antialias:true, powerPreference:'high-performance' })
  } catch(e){ return false }
  const dpr = Math.min(window.devicePixelRatio||1, cfg.renderer?.maxPixelRatio || 2)
  renderer.setPixelRatio(dpr)
  renderer.setSize(innerWidth, innerHeight)
  renderer.toneMapping = THREE.ACESFilmicToneMapping
  renderer.toneMappingExposure = num(cfg.renderer?.exposure, 1.05)
  renderer.outputColorSpace = THREE.SRGBColorSpace
  return true
}

function normalize(obj) {
  const box = new THREE.Box3().setFromObject(obj)
  const size = box.getSize(new THREE.Vector3())
  const maxDim = Math.max(size.x, size.y, size.z) || 1
  const s = num(cfg.model?.targetSize, 2.6) / maxDim * num(cfg.model?.scale, 1)
  obj.scale.setScalar(s)
  obj.updateMatrixWorld(true)
  const box2 = new THREE.Box3().setFromObject(obj)
  const c = box2.getCenter(new THREE.Vector3())
  const p = cfg.model?.position || [0,0,0]
  obj.position.set(-c.x + (p[0]||0), -c.y + (p[1]||0), -c.z + (p[2]||0))
  const r = cfg.model?.rotationDeg || [0,0,0]
  obj.rotation.set(r[0]*Math.PI/180, r[1]*Math.PI/180, r[2]*Math.PI/180)
}

function applyMaterial() {
  const g = cfg.materials?.global || {}
  model.traverse(o => {
    if (!o.isMesh) return
    ;[].concat(o.material).forEach(m => {
      if (!m || !('roughness' in m)) return
      if (typeof g.roughness === 'number') m.roughness = g.roughness
      if (typeof g.metalness === 'number') m.metalness = g.metalness
      if (typeof g.envMapIntensity === 'number') m.envMapIntensity = g.envMapIntensity
      m.needsUpdate = true
    })
  })
}

function placeCamera() {
  const c = cfg.camera || {}
  camera.fov = num(c.fov, 40); camera.updateProjectionMatrix()
  camera.position.setFromSpherical(new THREE.Spherical(num(c.distance,3.4), num(c.phi,1.2), num(c.theta,0.7)))
  initialCam.copy(camera.position)
  controls.target.set(0,0,0)
  controls.minDistance = num(c.minDistance, 1.4)
  controls.maxDistance = num(c.maxDistance, 7)
  controls.autoRotate = !reduceMotion && c.autoRotate !== false
  controls.autoRotateSpeed = num(c.autoRotateSpeed, 0.9)
  controls.update()
}

/* ── 环境 / IBL ── */
function roomIBL() {
  const pmrem = new THREE.PMREMGenerator(renderer)
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture
}
function panoramaIBL(url) {
  new THREE.TextureLoader().load(url, tex => {
    tex.mapping = THREE.EquirectangularReflectionMapping
    tex.colorSpace = THREE.SRGBColorSpace
    const pmrem = new THREE.PMREMGenerator(renderer)
    scene.environment = pmrem.fromEquirectangular(tex).texture
    if (cfg.environment?.visibleBackground) scene.background = tex
    tex.dispose(); pmrem.dispose()
  }, undefined, () => {/* 保底已是 RoomEnvironment */})
}

/* ── 热点 ── */
function buildHotspots() {
  const layer = $('hs-layer'); layer.innerHTML=''; hotspots=[]
  ;(cfg.hotspots||[]).forEach(h => {
    const el = document.createElement('div'); el.className='hs'
    el.addEventListener('click', e => { e.stopPropagation(); openHotspot(h, el) })
    layer.appendChild(el)
    hotspots.push({ data:h, el, world:new THREE.Vector3(...(h.position||[0,0,0])) })
  })
}
let hotspotsVisible = true
function updateHotspots() {
  const camDir = new THREE.Vector3()
  hotspots.forEach(hs => {
    const w = hs.world
    tmp.copy(w).project(camera)
    const onScreen = tmp.z < 1
    const x = (tmp.x*0.5+0.5)*innerWidth, y = (-tmp.y*0.5+0.5)*innerHeight
    // 近/远半球淡化（背面自动淡）
    camDir.copy(camera.position).sub(w).normalize()
    const facing = w.clone().normalize().dot(camDir) // 中心在原点
    let op = facing > 0.12 ? 1 : facing > -0.15 ? 0.28 : 0
    if (!hotspotsVisible || !onScreen) op = 0
    hs.el.style.opacity = op
    hs.el.style.pointerEvents = op > 0.5 ? 'auto' : 'none'
    hs.el.style.left = x+'px'; hs.el.style.top = y+'px'
  })
}

let focusAnim = null
function openHotspot(h, el) {
  controls.autoRotate = false; syncBtns()
  hotspots.forEach(x => x.el.classList.toggle('active', x.el===el))
  const tx = t(h.i18n)
  $('card-title').textContent = tx.title || ''
  $('card-body').textContent = tx.content || ''
  $('card').classList.add('show')
  if (h.cameraFocus) focusTo(new THREE.Vector3(...(h.position||[0,0,0])), num(h.cameraFocus.distance,2.4), num(h.cameraFocus.duration,800))
}
function closeHotspot() {
  $('card').classList.remove('show')
  hotspots.forEach(x => x.el.classList.remove('active'))
  focusTo(new THREE.Vector3(0,0,0), initialCam.length(), 700, initialCam.clone())
}
function focusTo(target, dist, dur, camOverride) {
  const startT = controls.target.clone(), startC = camera.position.clone()
  const endT = target.clone()
  const endC = camOverride || target.clone().add(camera.position.clone().sub(controls.target).normalize().multiplyScalar(dist))
  const t0 = performance.now()
  cancelAnimationFrame(focusAnim)
  const ease = x => x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2
  ;(function step(){
    const k = Math.min(1, (performance.now()-t0)/dur), e = ease(k)
    controls.target.lerpVectors(startT, endT, e)
    camera.position.lerpVectors(startC, endC, e)
    controls.update()
    if (k<1) focusAnim = requestAnimationFrame(step)
  })()
}

/* ── UI ── */
function renderText() {
  const x = t(cfg.i18n)
  $('c-name').textContent = x.title || '立体鉴赏'
  $('c-sub').textContent = x.subtitle || ''
  document.querySelectorAll('#presets .preset').forEach(b => {
    const p = (cfg.presets||[]).find(p=>p.id===b.dataset.id); if(p) b.textContent = t(p.label) || p.id
  })
  labelBtns()
}
const BTN = { rotate:{zh:'自动旋转',en:'Auto'}, hot:{zh:'热点',en:'Hotspots'}, reset:{zh:'重置',en:'Reset'}, full:{zh:'全屏',en:'Full'} }
function labelBtns(){ document.querySelectorAll('#actions .btn').forEach(b=>{ const k=b.dataset.k; if(BTN[k]) b.querySelector('.tx').textContent = BTN[k][lang] }) }
function syncBtns(){
  const r=document.querySelector('[data-k=rotate]'); if(r) r.classList.toggle('on', controls.autoRotate)
  const h=document.querySelector('[data-k=hot]'); if(h) h.classList.toggle('on', hotspotsVisible)
}
function buildHUD() {
  const ui = cfg.ui||{}
  const pr = $('presets')
  ;(cfg.presets||[]).forEach((p,i) => {
    if (!ui.showPresets) return
    const b=document.createElement('button'); b.className='preset'; b.dataset.id=p.id; b.textContent=t(p.label)||p.id
    b.onclick=()=>applyPreset(p); pr.appendChild(b)
  })
  const act = $('actions')
  const mk = (k, ic, on, fn) => { const b=document.createElement('button'); b.className='btn'+(on?' on':''); b.dataset.k=k
    b.innerHTML=`<span class="ic">${ic}</span><span class="tx"></span>`; b.onclick=fn; act.appendChild(b) }
  if (ui.showAutoRotateButton!==false) mk('rotate','↻', controls.autoRotate, ()=>{ controls.autoRotate=!controls.autoRotate; syncBtns() })
  if (ui.showHotspotButton!==false && (cfg.hotspots||[]).length) mk('hot','◈', true, ()=>{ hotspotsVisible=!hotspotsVisible; if(!hotspotsVisible) closeHotspot(); syncBtns() })
  if (ui.showResetButton!==false) mk('reset','⤢', false, ()=>{ closeHotspot() })
  if (ui.showFullscreenButton!==false) mk('full','⛶', false, ()=>{ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen() })
  labelBtns()
}
function applyPreset(p) {
  activePreset = p.id
  renderer.toneMappingExposure = num(p.exposure, renderer.toneMappingExposure)
  if (typeof p.envMapIntensity === 'number') { cfg.materials = cfg.materials||{}; cfg.materials.global = Object.assign(cfg.materials.global||{}, {envMapIntensity:p.envMapIntensity}); applyMaterial() }
  if (p.background) scene.background = cfg.environment?.visibleBackground ? scene.background : new THREE.Color(p.background)
  document.querySelectorAll('#presets .preset').forEach(b=>b.classList.toggle('on', b.dataset.id===p.id))
}

function onResize() { camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight) }
function animate(){ raf=requestAnimationFrame(animate); controls.update(); updateHotspots(); renderer.render(scene,camera) }

function start() {
  scene = new THREE.Scene()
  scene.background = new THREE.Color(cfg.renderer?.background || '#0f1118')
  camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 1000)
  controls = new OrbitControls(camera, renderer.domElement)
  controls.enableDamping = true; controls.dampingFactor = 0.08; controls.enablePan = false; controls.rotateSpeed = 0.9
  controls.addEventListener('start', ()=>{ controls.autoRotate=false; syncBtns() })
  roomIBL() // 先给内置环境，秒出反射

  new GLTFLoader().load(cfg.assets.model, gltf => {
    model = gltf.scene
    normalize(model); applyMaterial(); scene.add(model)
    placeCamera(); buildHotspots(); buildHUD(); renderText()
    // 背景真全景 IBL 后台加载，平滑接管
    if (cfg.environment?.mode === 'panorama' && cfg.assets.panorama) panoramaIBL(cfg.assets.panorama)
    $('topbar').removeAttribute('hidden'); $('hud').removeAttribute('hidden')
    if (cfg.ui?.showLangSwitch!==false) $('lang').removeAttribute('hidden')
    $('loading').classList.add('fade'); setTimeout(()=>$('loading').setAttribute('hidden',''), 460)
    $('hint').classList.add('show'); setTimeout(()=>$('hint').classList.remove('show'), 2600)
    if (editMode) buildEditor()
    animate()
  }, evt => {
    if (evt.total) { const p=Math.min(100,Math.round(evt.loaded/evt.total*100)); $('bar').style.width=p+'%'; $('load-text').textContent=`正在加载模型… ${p}%` }
  }, () => showError('模型加载失败，请检查网络后重试', true))

  addEventListener('resize', onResize)
  $('card-close').onclick = closeHotspot
  $('scene').addEventListener('pointerdown', ()=>{ if($('card').classList.contains('show')) return })
}

async function boot() {
  $('error').setAttribute('hidden',''); $('loading').removeAttribute('hidden'); $('loading').classList.remove('fade')
  let raw
  try { raw = await fetch('config.json',{cache:'no-cache'}); cfg = await raw.json() }
  catch(e){ return showError('配置加载失败：'+e.message, true) }
  if (!initRenderer()) return showError('当前浏览器不支持 3D 展示，请更换浏览器或升级微信')
  document.title = t(cfg.i18n).title || '立体鉴赏'
  if (cfg.assets.poster) { $('poster').style.backgroundImage=`url("${cfg.assets.poster}")`; $('poster').classList.add('on') }
  if (editMode) $('ed-badge').removeAttribute('hidden')
  start()
}

/* 语言切换 */
$('lang').addEventListener('click', e=>{ const l=e.target.dataset.l; if(!l||l===lang) return
  lang=l; document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l))
  renderText(); if($('card').classList.contains('show')){ /* 关闭以避免语言错位 */ closeHotspot() } })
$('err-btn').onclick = ()=>{ cancelAnimationFrame(raf); boot() }

/* ── 编辑模式（开发方；纯前端，导出 config，不写服务器）── */
function buildEditor() {
  const g = cfg.materials?.global || (cfg.materials={global:{}},cfg.materials.global)
  const ed = $('editor'); ed.removeAttribute('hidden')
  const row=(label,min,max,step,val,fn)=>`<div class="ed-row"><span>${label}</span><input type="range" min="${min}" max="${max}" step="${step}" value="${val}" data-fn="${fn}"></div>`
  ed.innerHTML = `<h3>渲染 / 材质</h3>
    ${row('曝光',0.4,2,0.01, renderer.toneMappingExposure,'exposure')}
    ${row('环境光强',0,3,0.05, num(g.envMapIntensity,1.35),'env')}
    ${row('金属度',0,1,0.01, 0.5,'metal')}
    ${row('粗糙度',0,1,0.01, 0.4,'rough')}
    <h3>相机</h3>
    ${row('自动旋转速度',0,4,0.1, controls.autoRotateSpeed,'rspeed')}
    <div class="ed-note">Shift + 点击模型表面 = 打热点（存模型局部坐标）。</div>
    <h3>导出</h3>
    <div class="ed-note" id="ed-hs">热点数：${(cfg.hotspots||[]).length}</div>
    <button class="ed-btn" id="ed-export">导出 config.json</button>
    <div class="ed-note">纯前端不写服务器：导出后由开发方替换展包再上传。</div>`
  ed.querySelectorAll('input[type=range]').forEach(inp => inp.oninput = () => {
    const v=parseFloat(inp.value), fn=inp.dataset.fn
    if(fn==='exposure') renderer.toneMappingExposure=v
    if(fn==='env'){ g.envMapIntensity=v; applyMaterial() }
    if(fn==='metal') model.traverse(o=>o.isMesh&&[].concat(o.material).forEach(m=>{if('metalness'in m){m.metalness=v;m.needsUpdate=1}}))
    if(fn==='rough') model.traverse(o=>o.isMesh&&[].concat(o.material).forEach(m=>{if('roughness'in m){m.roughness=v;m.needsUpdate=1}}))
    if(fn==='rspeed') controls.autoRotateSpeed=v
  })
  $('ed-export').onclick = () => {
    const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'})
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='config.json'; a.click()
  }
  // Shift+点击打点
  const ray=new THREE.Raycaster(), m2=new THREE.Vector2()
  $('scene').addEventListener('click', e=>{
    if(!e.shiftKey) return
    m2.x=e.clientX/innerWidth*2-1; m2.y=-(e.clientY/innerHeight)*2+1
    ray.setFromCamera(m2,camera); const hit=ray.intersectObject(model,true)[0]
    if(!hit) return
    const local=model.worldToLocal(hit.point.clone())
    const h={ id:'h'+((cfg.hotspots||[]).length+1), position:[+local.x.toFixed(3),+local.y.toFixed(3),+local.z.toFixed(3)],
      i18n:{ zh:{title:'新热点',content:'（待填写）'}, en:{title:'New',content:'(todo)'} }, cameraFocus:{distance:2.3,duration:800} }
    cfg.hotspots=cfg.hotspots||[]; cfg.hotspots.push(h); buildHotspots(); $('ed-hs').textContent='热点数：'+cfg.hotspots.length
  })
}

boot()
</script>
