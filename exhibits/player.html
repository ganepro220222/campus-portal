<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>з«ӢдҪ“йүҙиөҸ</title>
<link rel="icon" href="data:," />
<style>
  :root { --gold:#c8a86a; --ink:#0f1118; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  /* ж— йҡңзўҚпјҡй”®зӣҳз„ҰзӮ№еҸҜи§ҒпјҲйј ж ҮзӮ№еҮ»дёҚжҳҫзӨәпјҢTab еҜјиҲӘжүҚжҳҫзӨәпјү */
  :focus { outline:none; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  .btn:focus-visible, .preset:focus-visible, .au-btn:focus-visible, .card-close:focus-visible, .err-btn:focus-visible { outline:2px solid #f4e6c8; outline-offset:2px; }
  .hs:focus-visible { outline:2px solid #fff; outline-offset:3px; }
  html,body,#app { width:100%; height:100%; overflow:hidden; background:var(--ink); color:#eef0f5;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif; }
  #app { position:fixed; inset:0; }
  #scene { position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  [hidden] { display:none !important; }

  /* йЎ¶ж Ҹ */
  .topbar { position:absolute; left:0; right:0; top:0; z-index:5; pointer-events:none;
    padding:calc(env(safe-area-inset-top) + 16px) 20px 40px;
    background:linear-gradient(180deg, rgba(6,8,14,.72), rgba(6,8,14,0)); }
  .topbar-name { font-size:19px; font-weight:700; letter-spacing:1px; text-shadow:0 2px 12px rgba(0,0,0,.55); }
  .topbar-sub { margin-top:5px; font-size:12.5px; color:rgba(230,234,245,.72); max-width:80%;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .lang { position:absolute; top:calc(env(safe-area-inset-top) + 16px); right:16px; z-index:6; pointer-events:auto;
    display:flex; border:1px solid rgba(255,255,255,.22); border-radius:999px; overflow:hidden; font-size:12px; }
  .lang button { appearance:none; border:0; background:transparent; color:rgba(238,240,245,.7); padding:5px 12px; cursor:pointer; }
  .lang button.on { background:rgba(200,168,106,.22); color:#f4e6c8; }

  /* жҸҗзӨә */
  .hint { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) translateY(66px);
    padding:8px 18px; border-radius:999px; background:rgba(0,0,0,.5); backdrop-filter:blur(6px);
    font-size:12.5px; letter-spacing:1px; color:rgba(255,255,255,.86); z-index:6; pointer-events:none;
    opacity:0; transition:opacity .5s; }
  .hint.show { opacity:1; }

  /* зғӯзӮ№ж Үи®°пјҲеҸҢзҺҜпјҡдә®зҷҪеҶ…зҺҜ + жҡ—еӨ–жҸҸиҫ№ вҶ’ д»»ж„Ҹеә•иүІеҸҜи§Ғпјӣејәи°ғиүІж ёеҝғ = иә«д»ҪиүІпјү */
  .hs-layer { position:absolute; inset:0; z-index:4; pointer-events:none; }
  .hs { position:absolute; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer;
    width:var(--hs-size,26px); height:var(--hs-size,26px); will-change:transform,opacity; transition:opacity .25s; }
  .hs::before { content:""; position:absolute; inset:28%; border-radius:50%;
    background:var(--hs-color,#c8a86a); border:2px solid rgba(255,255,255,.95);
    box-shadow:0 0 0 3px rgba(0,0,0,.4), 0 0 10px 2px var(--hs-glow,rgba(200,168,106,.55)); }
  .hs::after { content:""; position:absolute; inset:28%; border-radius:50%;
    border:1.5px solid var(--hs-color,#c8a86a); animation:pulse 2.4s ease-out infinite; }
  .hs.no-pulse::after { animation:none; opacity:0; }
  .hs.active::before { background:#fff; border-color:#fff;
    box-shadow:0 0 0 3px rgba(0,0,0,.45), 0 0 12px 3px rgba(255,255,255,.5); }
  @keyframes pulse { 0%{transform:scale(1);opacity:.65} 100%{transform:scale(2.4);opacity:0} }
  @media (prefers-reduced-motion:reduce){ .hs::after{ animation:none; opacity:0 } }

  /* еә•йғЁе·Ҙе…·жқЎ */
  .hud { position:absolute; left:0; right:0; bottom:0; z-index:7;
    padding:34px 14px calc(env(safe-area-inset-bottom) + 16px);
    background:linear-gradient(0deg, rgba(6,8,14,.8), rgba(6,8,14,0));
    display:flex; flex-direction:column; gap:12px; align-items:center; }
  .presets { display:flex; gap:9px; }
  .preset { appearance:none; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06);
    color:rgba(238,240,245,.82); font-size:12px; padding:5px 15px; border-radius:999px; cursor:pointer; transition:.2s; }
  .preset.on { border-color:var(--gold); background:rgba(200,168,106,.2); color:#f4e6c8; }
  .actions { display:flex; gap:10px; }
  .btn { appearance:none; display:inline-flex; align-items:center; justify-content:center; gap:6px;
    height:44px; min-width:64px; padding:0 14px; border:1px solid rgba(255,255,255,.16); border-radius:14px;
    background:rgba(255,255,255,.08); backdrop-filter:blur(10px); color:#eef0f5; font-size:13px; cursor:pointer; transition:.18s; }
  .btn:active { transform:scale(.96); }
  .btn.on { border-color:var(--gold); background:rgba(200,168,106,.2); color:#f4e6c8; }
  .btn .ic { font-size:16px; line-height:1; }

  /* иҜӯйҹіи®Іи§Ј е°ҸеһӢж’ӯж”ҫеҷЁпјҲе·ҰдёҠпјҢж ҮйўҳдёӢж–№пјү */
  .audio { position:absolute; left:16px; top:calc(env(safe-area-inset-top) + 88px); z-index:7;
    display:flex; align-items:center; gap:10px; width:min(300px,78vw); padding:8px 12px;
    background:rgba(20,22,32,.72); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.14); border-radius:14px; }
  .au-btn { flex:0 0 auto; width:34px; height:34px; border-radius:50%; border:1px solid var(--gold);
    background:rgba(200,168,106,.18); color:#f4e6c8; font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:.18s; }
  .au-btn:active { transform:scale(.94); }
  .au-mid { flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }
  .au-top { display:flex; align-items:center; gap:8px; font-size:11.5px; color:rgba(238,240,245,.82); }
  .au-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .au-sel { flex:1; min-width:0; background:transparent; border:none; color:#eef0f5; font-size:11.5px; font-family:inherit; outline:none; cursor:pointer; }
  .au-sel option { background:#14161f; color:#eef0f5; }
  .au-time { flex:0 0 auto; color:rgba(238,240,245,.6); font-variant-numeric:tabular-nums; }
  .au-bar { height:4px; border-radius:2px; background:rgba(255,255,255,.16); cursor:pointer; overflow:hidden; }
  .au-bar>i { display:block; width:0; height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold),#e6cf9a); transition:width .1s linear; }

  /* дҝЎжҒҜйқўжқҝпјҲиҜҰжғ…еҚЎзүҮпјүпјҡеә•иүІз”ұж ·ејҸйў„и®ҫзұ»жҺ§еҲ¶ */
  .card { position:absolute; z-index:8; color:#eef0f5; opacity:0; pointer-events:none;
    transition:opacity .28s, transform .28s; }
  .card.show { opacity:1; pointer-events:auto; }
  .card-title { font-size:16px; font-weight:700; color:#f4e6c8; margin-bottom:8px; letter-spacing:.5px; }
  .card-body { font-size:13.5px; line-height:1.75; color:rgba(238,240,245,.92); }
  .card-close { position:absolute; top:12px; right:14px; font-size:20px; color:rgba(255,255,255,.6); cursor:pointer; line-height:1; }
  /* жө®еҠЁеҚЎзүҮпјҲJS е®ҡдҪҚеңЁзғӯзӮ№ж—Ғпјүпјҡе®ҪеұҸйҒҝи®©жЁЎеһӢжҠ•еҪұ + еҸідҫ§йқўжқҝпјӣзӘ„еұҸе°ұиҝ‘еӨ№еҸ–еңЁи§ҶеҸЈеҶ… */
  .card.float { width:min(300px, 86vw); padding:18px 20px; border-radius:16px; transform:scale(.92);
    transform-origin:var(--org, left center); }
  .card.float.show { transform:scale(1); }
  /* йқўжқҝж ·ејҸйў„и®ҫпјҡй»‘еә• / жҜӣзҺ»з’ғ / йҖҸжҳҺ */
  .card.st-solid { background:rgba(20,22,32,.94); backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.1); box-shadow:0 18px 44px rgba(0,0,0,.5); }
  .card.st-glass { background:rgba(24,26,38,.5); backdrop-filter:blur(22px) saturate(1.3);
    border:1px solid rgba(255,255,255,.18); box-shadow:0 18px 44px rgba(0,0,0,.42); }
  .card.st-transparent { background:transparent; backdrop-filter:none; border:none; box-shadow:none;
    border-left:2px solid var(--gold); border-radius:0; padding-left:16px; }
  .card.st-transparent .card-title, .card.st-transparent .card-body {
    text-shadow:0 2px 10px rgba(0,0,0,.92), 0 0 3px rgba(0,0,0,.85); }
  .card.st-transparent .card-close { text-shadow:0 1px 6px rgba(0,0,0,.9); color:rgba(255,255,255,.85); }
  /* жҸҸиҫ№пјҡз»ҶйҮ‘иҫ№ + ж ҮйўҳдёӢзҹӯжЁӘпјҢжҺҘиҝ‘зӣҙи§’ */
  .card.st-outline { background:rgba(12,14,20,.42); backdrop-filter:blur(10px); border:1.5px solid var(--gold); border-radius:6px; box-shadow:0 12px 32px rgba(0,0,0,.45); }
  .card.st-outline .card-title { padding-bottom:9px; position:relative; }
  .card.st-outline .card-title::after { content:""; position:absolute; left:0; bottom:2px; width:32px; height:2px; background:var(--gold); border-radius:2px; }
  /* иүІеёҰж Үйўҳпјҡж ҮйўҳеөҢеңЁйҮ‘иүІиүІеёҰеҶ…пјҢжӯЈж–ҮеңЁж·ұиүІеҢәпјҲзүҲејҸдёҚеҗҢпјү */
  .card.st-ribbon { background:rgba(18,20,29,.94); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.1); border-radius:14px; box-shadow:0 18px 44px rgba(0,0,0,.5); padding:0; overflow:hidden; }
  .card.st-ribbon .card-title { margin:0; padding:12px 20px; background:linear-gradient(90deg,var(--gold),#e6cf9a); color:#0b0d14; font-weight:800; }
  .card.st-ribbon .card-body { padding:14px 20px 18px; }
  .card.st-ribbon .card-close { color:#0b0d14; }
  /* жһҒз®Җз«–зәҝпјҡж— жЎҶ + е·ҰйҮ‘з«–зәҝ + жёҗйҡҗж·ұеә• */
  .card.st-minimal { background:linear-gradient(90deg,rgba(9,11,16,.8),rgba(9,11,16,.28)); backdrop-filter:blur(6px); border:none; border-left:2px solid var(--gold); border-radius:0 12px 12px 0; box-shadow:none; }
  .card.st-minimal .card-title { font-size:14px; letter-spacing:1.5px; color:#f4e6c8; }
  .card.st-minimal .card-body { color:rgba(238,240,245,.82); }
  /* еј•зәҝ SVG */
  .hs-svg { position:absolute; inset:0; width:100%; height:100%; z-index:6; pointer-events:none; overflow:visible; }
  #hs-leader { stroke:var(--gold); stroke-width:1.6; stroke-linecap:round; stroke-linejoin:miter; fill:none; opacity:.95;
    filter:drop-shadow(0 0 3px rgba(200,168,106,.5)); }
  #hs-leader.straight { stroke-width:1.3; opacity:.82; }
  #hs-dot { fill:var(--gold); filter:drop-shadow(0 0 4px rgba(200,168,106,.7)); }
  #hs-knee { fill:var(--gold); stroke:#0f1118; stroke-width:1.5; opacity:0; pointer-events:none; }
  #hs-knee.edit { opacity:.92; pointer-events:auto; cursor:grab; }
  #hs-knee.edit:active { cursor:grabbing; }
  body.edit-callout .hs-svg { pointer-events:auto; cursor:default; }
  body.edit-callout .card.ed-movable .card-title { cursor:grab; }
  body.edit-callout .card.ed-movable .card-title:active { cursor:grabbing; }
  body.edit-callout .card.ed-movable .card-title::after { content:' В· еҸҜжӢ–жӢҪ'; font-size:11px; font-weight:400; color:rgba(244,230,200,.55); }

  /* йҒ®зҪ©пјҡеҠ иҪҪ / й”ҷиҜҜ */
  .overlay { position:absolute; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 90% at 50% 40%, #1c2030 0%, #0b0d14 100%); transition:opacity .45s; }
  .overlay.fade { opacity:0; }
  .poster { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0;
    transform:scale(1.06); filter:blur(3px) brightness(.5); }
  .poster.on { opacity:1; }
  .ov-inner { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:15px; padding:0 32px; text-align:center; }
  .spin { width:38px; height:38px; border-radius:50%; border:3px solid rgba(255,255,255,.16); border-top-color:var(--gold); animation:spin .9s linear infinite; }
  @keyframes spin { to{ transform:rotate(360deg) } }
  .ov-text { font-size:13px; letter-spacing:1px; color:rgba(238,240,245,.86); text-shadow:0 1px 8px rgba(0,0,0,.6); }
  .bar { width:180px; height:4px; border-radius:2px; background:rgba(255,255,255,.14); overflow:hidden; }
  .bar>i { display:block; width:0; height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold),#e6cf9a); transition:width .25s; }
  .err-ic { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:700; color:#0b0d14; background:var(--gold); }
  .err-btn { margin-top:4px; padding:9px 24px; border:1px solid var(--gold); border-radius:999px; background:transparent; color:#f4e6c8; font-size:13px; cursor:pointer; }

  /* EDITOR-CSS-START пјҲеҜјеҮәд»…и§ӮзңӢзүҲж—¶ж•ҙж®өеү”йҷӨпјү */
  /* зј–иҫ‘йқўжқҝпјҲ?mode=editпјү */
  .editor { position:absolute; top:0; right:0; bottom:0; width:300px; z-index:20; overflow-y:auto; overflow-x:hidden;
    background:rgba(14,16,24,.95); border-left:1px solid rgba(255,255,255,.1); padding:16px; font-size:12.5px;
    scrollbar-width:thin; scrollbar-color:rgba(200,168,106,.4) transparent; }
  .editor::-webkit-scrollbar { width:8px; }
  .editor::-webkit-scrollbar-track { background:transparent; }
  .editor::-webkit-scrollbar-thumb { background:rgba(200,168,106,.32); border-radius:4px; border:2px solid transparent; background-clip:padding-box; }
  .editor::-webkit-scrollbar-thumb:hover { background:rgba(200,168,106,.55); background-clip:padding-box; }
  .editor h3 { font-size:13px; color:var(--gold); margin:14px 0 8px; letter-spacing:.5px; }
  .editor h3:first-child { margin-top:0; }
  .ed-row { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:7px 0; color:#cfd3e0; }
  .ed-row input[type=range]{ flex:1; min-width:0; accent-color:var(--gold); }
  .ed-row input[type=color]{ width:30px; height:22px; border:none; background:none; padding:0; cursor:pointer; flex:0 0 auto; }
  /* ж»‘жқЎ + ж•°еӯ—иҫ“е…Ҙ иҒ”еҠЁз»„д»¶ */
  .ed-slider { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .ed-num { flex:0 0 auto; width:56px; padding:3px 6px; border:1px solid rgba(255,255,255,.14); border-radius:6px;
    background:rgba(255,255,255,.05); color:#eef0f5; font-size:11.5px; font-family:inherit; text-align:right;
    -moz-appearance:textfield; }
  .ed-num::-webkit-outer-spin-button, .ed-num::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .ed-num:focus { outline:none; border-color:var(--gold); }
  .ed-note { color:#8a90a6; line-height:1.6; margin:6px 0; }
  .ed-sec { border:1px solid rgba(255,255,255,.08); border-radius:8px; margin:8px 0; padding:2px 10px; }
  .ed-sec summary { cursor:pointer; color:var(--gold); font-size:13px; font-weight:600; padding:8px 0; letter-spacing:.5px; list-style:none; }
  .ed-sec summary::-webkit-details-marker { display:none; }
  .ed-sec summary::before { content:"в–ё "; }
  .ed-sec[open] summary::before { content:"в–ҫ "; }
  .ed-in { width:100%; margin:5px 0; padding:7px 9px; border:1px solid rgba(255,255,255,.14); border-radius:7px;
    background:rgba(255,255,255,.05); color:#eef0f5; font-size:12px; font-family:inherit; }
  .editor select.ed-in { color:#eef0f5; }
  .editor select option { background:#14161f; color:#eef0f5; }   /* дҝ®еӨҚдёӢжӢүйЎ№жө…еә•жө…еӯ—зңӢдёҚжё… */
  textarea.ed-in { resize:vertical; min-height:76px; line-height:1.6; }
  .ed-file { display:block; text-align:center; margin:5px 0; padding:8px; border:1px dashed rgba(255,255,255,.22);
    border-radius:7px; color:#cfd3e0; cursor:pointer; font-size:12px; }
  .ed-hs-item { border:1px solid rgba(255,255,255,.08); border-radius:7px; padding:6px 8px; margin:7px 0; }
  .ed-hs-item b { color:var(--gold); }
  .editor a { cursor:pointer; color:var(--gold); text-decoration:none; }
  .ed-btn { width:100%; margin-top:6px; padding:9px; border:1px solid var(--gold); border-radius:8px;
    background:transparent; color:#f4e6c8; cursor:pointer; font-size:12.5px; }
  .ed-btn.ed-save { background:var(--gold); color:#0b0d14; font-weight:700; font-size:13.5px; padding:11px; }
  .ed-btn.ed-save:hover { background:#d8b877; }
  .ed-btn.ed-save:disabled { opacity:.6; cursor:default; }
  .ed-badge { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:21; background:rgba(200,168,106,.92); color:#0b0d14;
    font-size:11px; font-weight:700; padding:3px 12px; border-radius:999px; }
  /* EDITOR-CSS-END */
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <header class="topbar" hidden id="topbar">
    <div class="topbar-name" id="c-name"></div>
    <div class="topbar-sub" id="c-sub"></div>
  </header>
  <div class="hint" id="hint">жӢ–еҠЁж—ӢиҪ¬ В· еҸҢжҢҮзј©ж”ҫ</div>
  <svg class="hs-svg" id="hs-svg" hidden><polyline id="hs-leader" points="" /><circle id="hs-dot" r="3.4" cx="0" cy="0" /><circle id="hs-knee" r="5" cx="0" cy="0" hidden /></svg>
  <div class="hs-layer" id="hs-layer"></div>

  <!-- иҜӯйҹіи®Іи§Ј е°ҸеһӢж’ӯж”ҫеҷЁ -->
  <div class="audio" hidden id="audio" role="group" aria-label="иҜӯйҹіи®Іи§Јж’ӯж”ҫеҷЁ">
    <button class="au-btn" id="au-play" aria-label="ж’ӯж”ҫ/жҡӮеҒңиҜӯйҹіи®Іи§ЈпјҲз©әж јй”®пјү">в–¶</button>
    <div class="au-mid">
      <div class="au-top">
        <select class="au-sel" id="au-sel" hidden aria-label="йҖүжӢ©иҜӯйҹіи®Іи§Ј"></select>
        <span class="au-name" id="au-name">иҜӯйҹіи®Іи§Ј</span>
        <span class="au-time" id="au-time">0:00</span>
      </div>
      <div class="au-bar" id="au-bar"><i id="au-prog"></i></div>
    </div>
  </div>
  <audio id="au-el" preload="none"></audio>

  <div class="hud" hidden id="hud">
    <div class="presets" id="presets"></div>
    <div class="actions" id="actions"></div>
  </div>

  <div class="card" id="card" role="dialog" aria-labelledby="card-title" aria-modal="false">
    <span class="card-close" id="card-close" role="button" tabindex="0" aria-label="е…ій—ӯи®Іи§Ј">Г—</span>
    <div class="card-title" id="card-title"></div>
    <div class="card-body" id="card-body"></div>
  </div>

  <div class="overlay" id="loading">
    <div class="poster" id="poster"></div>
    <div class="ov-inner">
      <div class="spin"></div>
      <div class="ov-text" id="load-text">жӯЈеңЁеҠ иҪҪвҖҰ</div>
      <div class="bar"><i id="bar"></i></div>
    </div>
  </div>
  <div class="overlay error" hidden id="error">

let kneeDrag=null, panelDrag=null, lastPts=null, lastMx=0, lastMy=0, lastAx=0, lastAy=0
function wireCalloutDrag(){

      if (!d.calloutPosManual){ d.calloutPos=packCalloutPos(ox,oy); d.calloutPosManual=true }
      panelDrag={ sx:e.clientX, sy:e.clientY, ox, oy }; c.setPointerCapture(e.pointerId); syncLeaderEditorUI()
    })

function updateCallout() {

  } else {

    const pad = 10, safeTop = 60, safeBot = 148

    if (cy + ch > innerHeight - safeBot) cy = my - 22 - ch          // дёӢж–№ж”ҫдёҚдёӢе°ұж”ҫдёҠж–№
    cy = Math.min(Math.max(safeTop, cy), innerHeight - ch - pad)

  }
}
function focusTo(target, dist, dur, camOverride) {
  const startT = controls.target.clone(), startC = camera.position.clone()
  const endT = target.clone()
  const endC = camOverride || target.clone().add(camera.position.clone().sub(controls.target).normalize().multiplyScalar(dist))
  const t0 = performance.now()
  cancelAnimationFrame(focusAnim)
  const ease = x => x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2
  ;(function step(){
    const k = Math.min(1, (performance.now()-t0)/dur), e = ease(k)
    controls.target.lerpVectors(startT, endT, e)
    camera.position.lerpVectors(startC, endC, e)
    controls.update()
    if (k<1) focusAnim = requestAnimationFrame(step)
  })()
}

let _draco = null, _ktx2 = null
function makeLoader() {

  }, () => showError('жЁЎеһӢеҠ иҪҪеӨұиҙҘпјҢиҜ·жЈҖжҹҘзҪ‘з»ңеҗҺйҮҚиҜ•', true))

  addEventListener('resize', onResize)
  $('card-close').onclick = closeHotspot
  $('card-close').addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); closeHotspot() } })
  $('scene').addEventListener('pointerdown', ()=>{ if($('card').classList.contains('show')) return })
  // й”®зӣҳеҝ«жҚ·й”®пјҡEsc е…ійқўжқҝ В· з©әж ј ж’ӯ/жҡӮеҒңиҜӯйҹі
  addEventListener('keydown', e => {
    if (e.key === 'Escape') { if ($('card').classList.contains('show')) closeHotspot() }
    else if (e.key === ' ' || e.code === 'Space') {
      const tag = (e.target?.tagName || '').toLowerCase()
      if (tag==='input' || tag==='textarea' || tag==='select' || tag==='button' || tag==='a') return  // дёҚе№Іжү°жҺ§д»¶/иҫ“е…Ҙ
      if (auTracks.length) { e.preventDefault(); const a=$('au-el'); a.paused ? a.play().catch(()=>{}) : a.pause() }
    }
  })
}

async function boot() {
  $('error').setAttribute('hidden',''); $('loading').removeAttribute('hidden'); $('loading').classList.remove('fade')
  try {
    if (window.__CFG__) cfg = window.__CFG__            // дҫҝжҗәеҚ•ж–Үд»¶пјҡеҶ…иҒ”й…ҚзҪ®пјҢе…Қ fetchпјҲеҸҜеҸҢеҮ» file:// жү“ејҖпјү
    else cfg = await (await fetch(BASE + 'config.json', {cache:'no-cache'})).json()   // е…ұдә«ж’ӯж”ҫеҷЁпјҡжҢү ?ex= иҜ»иҜҘеұ•е“Ғй…ҚзҪ®
  }
  catch(e){ return showError('й…ҚзҪ®еҠ иҪҪеӨұиҙҘпјҡ'+e.message, true) }
  if (!initRenderer()) return showError('еҪ“еүҚжөҸи§ҲеҷЁдёҚж”ҜжҢҒ 3D еұ•зӨәпјҢиҜ·жӣҙжҚўжөҸи§ҲеҷЁжҲ–еҚҮзә§еҫ®дҝЎ')
  document.title = t(cfg.i18n).title || 'з«ӢдҪ“йүҙиөҸ'
  if (cfg.assets.poster) { $('poster').style.backgroundImage=`url("${asset(cfg.assets.poster)}")`; $('poster').classList.add('on') }
  if (editMode) $('ed-badge').removeAttribute('hidden')
  start()
}

let _perfTimer = null
function buildEditor() {
  const ed = $('editor'); ed.removeAttribute('hidden')
  window.__edRefresh = renderEditor
  renderEditor()
  wireCanvasAdd()
  clearInterval(_perfTimer)
  _perfTimer = setInterval(() => {
    const el = document.getElementById('ed-perf'); if (!el) return
    const info = renderer.info.render, st = modelStats()
    el.innerHTML = `FPS ${fps} В· Draw ${info.calls} В· дёүи§’йқў ${st.tris.toLocaleString()}<br>йЎ¶зӮ№ ${st.verts.toLocaleString()} В· жқҗиҙЁ ${st.mats} В· иҙҙеӣҫ ${st.tex} В· DPR ${renderer.getPixelRatio()}`
    const warn = st.tris>500000 || renderer.getPixelRatio()>2
    el.style.color = warn ? '#e6a23c' : '#8a90a6'
  }, 500)
}

function wireEditor() {
  const g=cfg.materials.global, m=cfg.model, c=cfg.camera, L=cfg.lights
  const ed = $('editor')
  function applyRange(k, v){
    switch(k){
      case 'g.exposure': renderer.toneMappingExposure=v; break
      case 'g.env': g.envMapIntensity=v; applyMaterial(); break
      case 'g.metal': g.metalness=v; applyMaterial(); break
      case 'g.rough': g.roughness=v; applyMaterial(); break
      case 'm.scale': m.scale=v; normalize(model); break
      case 'm.size': m.targetSize=v; normalize(model); break
      case 'm.px': m.position=[v,(m.position||[0,0,0])[1],(m.position||[0,0,0])[2]]; normalize(model); break
      case 'm.py': m.position=[(m.position||[0,0,0])[0],v,(m.position||[0,0,0])[2]]; normalize(model); break
      case 'm.pz': m.position=[(m.position||[0,0,0])[0],(m.position||[0,0,0])[1],v]; normalize(model); break
      case 'm.ry': m.rotationDeg=[(m.rotationDeg||[0,0,0])[0],v,(m.rotationDeg||[0,0,0])[2]]; normalize(model); break
      case 'c.fov': c.fov=v; camera.fov=v; camera.updateProjectionMatrix(); break
      case 'c.rspeed': c.autoRotateSpeed=v; controls.autoRotateSpeed=v; break
      case 'c.min': c.minDistance=v; controls.minDistance=v; break
      case 'c.max': c.maxDistance=v; controls.maxDistance=v; break
      case 'c.pivy': c.pivot=[(c.pivot||[0,0,0])[0], v, (c.pivot||[0,0,0])[2]]; pivot.set(c.pivot[0],c.pivot[1],c.pivot[2]); if(!activeHS){ controls.target.copy(pivot); controls.update() } break
      case 'l.amb': L.ambient=L.ambient||{}; L.ambient.intensity=v; lightRefs.ambient.intensity=v; break
      case 'l.key': L.key=L.key||{}; L.key.intensity=v; lightRefs.key.intensity=v; break
      case 'l.fill': L.fill=L.fill||{}; L.fill.intensity=v; lightRefs.fill.intensity=v; break
      case 'l.rim': L.rim=L.rim||{}; L.rim.intensity=v; lightRefs.rim.intensity=v; break
      case 'hs.size': cfg.hotspotStyle=cfg.hotspotStyle||{}; cfg.hotspotStyle.size=v; buildHotspots(); break
      case 'leader.gap': cfg.panel=cfg.panel||{}; cfg.panel.leaderGap=v; clearLeaderParams(); break
      case 'leader.tail': cfg.panel=cfg.panel||{}; cfg.panel.leaderTail=v; clearLeaderParams(); break
      case 'ov.metal': case 'ov.rough': case 'ov.env': upsertOverride(); break
    }
  }
  // ж»‘жқЎ вҶ’ иҒ”еҠЁж•°еӯ—жЎҶ
  ed.querySelectorAll('input[type=range]').forEach(inp => inp.oninput = e => {
    const k=inp.dataset.k, v=parseFloat(e.target.value)
    const n=ed.querySelector(`.ed-num[data-num="${k}"]`); if(n) n.value=v
    applyRange(k,v)
  })
  // ж•°еӯ—жЎҶ вҶ’ иҒ”еҠЁж»‘жқЎпјҲиҫ“е…Ҙж—¶жҢүиҢғеӣҙеӨ№еҸ–еә”з”ЁпјҢеӨұз„Ұж—¶еӣһеЎ«еӨ№еҸ–еҗҺзҡ„еҖјпјү
  ed.querySelectorAll('.ed-num').forEach(inp => {
    inp.oninput = () => {
      const k=inp.dataset.num; let v=parseFloat(inp.value); if(isNaN(v)) return

      if(!isNaN(mn)&&v<mn)v=mn; if(!isNaN(mx)&&v>mx)v=mx
      const r=ed.querySelector(`input[type=range][data-k="${k}"]`); if(r) r.value=v
      applyRange(k,v)

    inp.onchange = () => { let v=parseFloat(inp.value); if(isNaN(v)){ return }

  // еҹәжң¬дҝЎжҒҜпјҡж Үйўҳ / еүҜж ҮйўҳпјҲе®һж—¶жӣҙж–°е·ҰдёҠи§’пјү
  const bindInfo=(id,key)=>{ const i=el(id); if(i) i.oninput=e=>{ cfg.i18n=cfg.i18n||{}; cfg.i18n.zh=cfg.i18n.zh||{}; cfg.i18n.zh[key]=e.target.value; renderText() } }

    if($('card').classList.contains('show')){ const c=$('card'); c.classList.remove('st-solid','st-glass','st-transparent','st-outline','st-ribbon','st-minimal'); c.classList.add('st-'+e.target.value) } } }
  const lz=el('ed-leader'); if(lz){ lz.value=(cfg.panel&&(cfg.panel.leader==='straight'||cfg.panel.leader==='line'))?'straight':'elbow'; lz.onchange=e=>{ cfg.panel=cfg.panel||{}; cfg.panel.leader=e.target.value; syncLeaderEditorUI(); bumpLeader() } }
  const dz2=el('ed-dir'); if(dz2){ dz2.value=(cfg.panel&&cfg.panel.dir)||'auto'; dz2.onchange=e=>{

    clearLeaderParams() } }
  const em=el('ed-elbow-mode'); if(em){ em.value=(cfg.panel&&cfg.panel.elbowMode)||'orthogonal'; em.onchange=e=>{

    if (e.target.value==='leg2-lock') cfg.panel=LG.migratePanelLeader(cfg.panel)
    clearManualKnee(activeHS?.data); syncLeaderEditorUI(); bumpLeader() } }
  const l1=el('ed-leg1-axis'); if(l1){ l1.value=(cfg.panel&&cfg.panel.leg1Axis)||'auto'; l1.onchange=e=>{
    cfg.panel=cfg.panel||{}; cfg.panel.leg1Axis=e.target.value; clearLeaderParams() } }
  const l2=el('ed-leg2-axis'); if(l2){ l2.value=(cfg.panel&&(cfg.panel.leg2Axis||cfg.panel.leg1Axis))||'auto'; l2.onchange=e=>{

  const kr=el('ed-knee-reset'); if(kr) kr.onclick=()=>{ if(activeHS?.data){ clearManualKnee(activeHS.data); bumpLeader(); syncLeaderEditorUI(); flash('е·ІжҒўеӨҚиҮӘеҠЁжҠҳзӮ№') } else flash('иҜ·е…Ҳжү“ејҖдёҖдёӘзғӯзӮ№') }
  const pr=el('ed-panel-reset'); if(pr) pr.onclick=()=>{ if(activeHS?.data){ delete activeHS.data.calloutPos; delete activeHS.data.calloutPosManual; bumpLeader(); syncLeaderEditorUI(); flash('е·ІжҒўеӨҚиҮӘеҠЁйқўжқҝдҪҚзҪ®') } else flash('иҜ·е…Ҳжү“ејҖдёҖдёӘзғӯзӮ№') }
  syncLeaderEditorUI()
  wireCalloutDrag()
  el('ed-url-load').onclick=()=>{ const u=el('ed-url').value.trim(); if(u){ cfg.assets=cfg.assets||{}; cfg.assets.model=u; reloadModel(u) } }
  el('ed-file').onchange=e=>{ const f=e.target.files[0]; if(f) reloadModel(URL.createObjectURL(f), true) }
  const dz=el('editor'); ;['dragover','drop'].forEach(ev=>dz.addEventListener(ev,e=>e.preventDefault()))
  el('ed-m-reset').onclick=()=>{ m.scale=1; m.position=[0,0,0]; m.rotationDeg=[0,0,0]; normalize(model); renderEditor() }
  el('ed-cam-save').onclick=()=>{ const s=new THREE.Spherical().setFromVector3(camera.position.clone().sub(controls.target))
    c.distance=+s.radius.toFixed(3); c.phi=+s.phi.toFixed(3); c.theta=+s.theta.toFixed(3); initialCam.copy(camera.position); flash('е·ІдҝқеӯҳеҪ“еүҚи§Ҷи§’') }
  el('ed-pano-load').onclick=()=>{ const u=el('ed-pano').value.trim(); if(u){ cfg.assets=cfg.assets||{}; cfg.assets.panorama=u; panoramaIBL(u) } }
  el('ed-matsel')?.addEventListener('change', loadOverride); loadOverride()
  el('ed-pr-add').onclick=()=>{ const shown=cfg.presets.filter(pp=>pp.showAsButton!==false).length
    cfg.presets.push({ id:'p'+(cfg.presets.length+1), label:{zh:'йў„и®ҫ'+(cfg.presets.length+1),en:'Preset'+(cfg.presets.length+1)},
      exposure:+renderer.toneMappingExposure.toFixed(2), envMapIntensity:num(g.envMapIntensity,1.35), background:cfg.renderer?.background||'#0f1118',

  $('editor').querySelectorAll('[data-pr-btn]').forEach(cb=>cb.onchange=e=>{ const idx=+cb.dataset.prBtn
    if(e.target.checked){ const shown=cfg.presets.filter((pp,j)=>j!==idx && pp.showAsButton!==false).length; if(shown>=4){ e.target.checked=false; flash('еүҚеҸ°жңҖеӨҡжҳҫзӨә 4 дёӘе…үжәҗжҢүй’®'); return } }

  el('ed-export').onclick=()=>downloadJSON()

function loadOverride(){ const sel=document.getElementById('ed-matsel'); if(!sel||!sel.value) return
  const o=(cfg.materials.overrides||[]).find(x=>x.namePattern===sel.value)||{}
  const set=(k,v)=>{ if(typeof v!=='number') return
    const i=document.querySelector(`input[type=range][data-k="${k}"]`); if(i) i.value=v
    const n=document.querySelector(`.ed-num[data-num="${k}"]`); if(n) n.value=v }
  set('ov.metal',o.metalness); set('ov.rough',o.roughness); set('ov.env',o.envMapIntensity) }
function upsertOverride(){ const sel=document.getElementById('ed-matsel'); if(!sel||!sel.value) return
  let o=cfg.materials.overrides.find(x=>x.namePattern===sel.value)
  if(!o){ o={namePattern:sel.value}; cfg.materials.overrides.push(o) }
  o.metalness=parseFloat(document.querySelector('[data-k="ov.metal"]').value)
  o.roughness=parseFloat(document.querySelector('[data-k="ov.rough"]').value)
  o.envMapIntensity=parseFloat(document.querySelector('[data-k="ov.env"]').value)
  applyMaterial() }
function buildHUD_refresh(){ $('presets').innerHTML=''; $('actions').innerHTML=''; buildHUD(); renderText() }
function downloadJSON(){ const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'})
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='config.json'; a.click() }
// жҲӘеҸ–гҖҢж•ҙеҷЁе…Ҙй•ңгҖҚзҡ„дёҖеё§дҪңзј©з•Ҙеӣҫ/е°ҒйқўпјҲдёҙж—¶жҠҠзӣёжңәжӢүеҲ°еҲҡеҘҪжЎҶдҪҸж•ҙдёӘжЁЎеһӢпјҢжӢҚе®ҢеӨҚдҪҚпјү
function capturePoster(){
  if(!model) return renderer.domElement.toDataURL('image/jpeg',0.86)
  const box=modelBox.clone(), c=box.getCenter(new THREE.Vector3()), s=box.getSize(new THREE.Vector3())
  const maxDim=Math.max(s.x,s.y,s.z)||1
  const fit=(maxDim*0.5)/Math.tan(camera.fov*Math.PI/360)*1.5 + maxDim*0.2   // з•ҷиҫ№и·қ
  const pos0=camera.position.clone(), tgt0=controls.target.clone()
  const dir=new THREE.Vector3(0.28,0.12,1).normalize()                       // з•ҘеёҰдҝҜи§’зҡ„жӯЈйқў
  camera.position.copy(c).add(dir.multiplyScalar(fit)); controls.target.copy(c); camera.lookAt(c)
  renderer.render(scene,camera)
  const url=renderer.domElement.toDataURL('image/jpeg',0.86)
  camera.position.copy(pos0); controls.target.copy(tgt0); controls.update(); renderer.render(scene,camera)
  return url
}
// дҝқеӯҳеүҚж ЎйӘҢпјҡerrs йҳ»ж–ӯдҝқеӯҳпјҢwarns жҸҗзӨәзЎ®и®Ө
function preSaveIssues(){
  const errs=[], warns=[]
  if(!cfg.assets?.model) errs.push('зјәе°‘жЁЎеһӢж–Үд»¶')
  if(!((cfg.i18n?.zh?.title)||'').trim()) warns.push('жңӘеЎ«ж Үйўҳ')
  ;(cfg.hotspots||[]).forEach((h,i)=>{ const x=h.i18n?.zh||{}; if(!((x.title||'').trim())&&!((x.content||'').trim())) warns.push('зғӯзӮ№ #'+(i+1)+' ж— ж Үйўҳ/ж–ҮжЎҲ') })
  ;(cfg.audio||[]).forEach(a=>{ if(!a||!a.src) warns.push('иҜӯйҹігҖҢ'+((a&&a.label)||(a&&a.id)||'?')+'гҖҚзјәж–Үд»¶') })
  return { errs, warns }
}
// дёҖй”®дҝқеӯҳпјҡй…ҚзҪ®дәҶ SAVE_API еҲҷеҶҷеӣһжңҚеҠЎеҷЁпјҲеҗҺз«ҜиҙҹиҙЈеӨҮд»ҪдёҠдёҖзүҲпјүпјӣеҗҰеҲҷйҷҚзә§дёәеҜјеҮә config.json
async function doSave(){
  const { errs, warns } = preSaveIssues()
  if(errs.length){ flash('вҡ  ж— жі•дҝқеӯҳпјҡ'+errs.join('пјӣ')); return }
  if(warns.length && !confirm('дҝқеӯҳеүҚжҸҗйҶ’пјҡ\nВ· '+warns.join('\nВ· ')+'\n\nд»ҚиҰҒдҝқеӯҳеҗ—пјҹ')) return
  const SAVE_API = window.__SAVE_API__ || (cfg.ui && cfg.ui.saveEndpoint) || ''
  if(!SAVE_API){ downloadJSON(); flash('е·ІеҜјеҮә config.json вҖ”вҖ” жңӘй…ҚзҪ®жңҚеҠЎеҷЁпјҢиҜ·жүӢеҠЁиҰҶзӣ–дёҠдј '); return }
  const btn=$('ed-save'), old=btn.textContent; btn.disabled=true; btn.textContent='дҝқеӯҳдёӯвҖҰ'
  let poster=null
  try{ poster=capturePoster(); cfg.assets=cfg.assets||{}; cfg.assets.poster='assets/poster.jpg' }catch(e){}  // дҝқеӯҳеҚіеҲ·ж–°зј©з•Ҙеӣҫ
  try{
    const res = await fetch(SAVE_API.replace('{ex}', encodeURIComponent(EX)), {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({ ex:EX, config:cfg, poster }) })
    if(!res.ok) throw new Error('HTTP '+res.status)
    flash('вң“ е·ІдҝқеӯҳеҲ°жңҚеҠЎеҷЁпјҲеҗ«зј©з•Ҙеӣҫпјү')
  }catch(e){ flash('вң— дҝқеӯҳеӨұиҙҘпјҡ'+e.message+'пјҲеҸҜж”№з”ЁгҖҢеҜјеҮә config.jsonгҖҚжүӢеҠЁдёҠдј пјү') }
  finally{ btn.disabled=false; btn.textContent=old }
}
function validateReport(){ const p=[]; const ok=x=>`вң… ${x}`, wn=x=>`вҡ пёҸ ${x}`
  p.push((cfg.i18n?.zh?.title)?ok('ж Үйўҳ'):wn('зјәж Үйўҳ'))
  p.push(cfg.assets?.model?ok('жЁЎеһӢпјҡ'+cfg.assets.model):wn('зјәжЁЎеһӢ'))
  p.push(cfg.assets?.panorama?ok('е…ЁжҷҜпјҡ'+cfg.assets.panorama):wn('ж— е…ЁжҷҜпјҲз”ЁеҶ…зҪ®зҺҜеўғпјү'))
  p.push(cfg.assets?.poster?ok('е°Ғйқў'):wn('ж— е°Ғйқў'))
  p.push(`зғӯзӮ№ ${cfg.hotspots.length} В· йў„и®ҫ ${cfg.presets.length} В· иҜӯйҹі ${(cfg.audio||[]).length}`)
  ;(cfg.audio||[]).forEach(a=>{ if(!a.src) p.push(wn('иҜӯйҹігҖҢ'+(a.label||a.id)+'гҖҚзјәж–Үд»¶')) })
  const st=modelStats(); p.push(st.tris>500000?wn('дёүи§’йқўеҒҸеӨҡ '+st.tris.toLocaleString()):ok('дёүи§’йқў '+st.tris.toLocaleString()))
  return p.join('<br>') }
function flash(msg){ const e=document.createElement('div'); e.textContent=msg; e.style.cssText='position:fixed;left:50%;top:40px;transform:translateX(-50%);background:rgba(200,168,106,.95);color:#0b0d14;padding:7px 16px;border-radius:999px;font-size:12.5px;z-index:99'; document.body.appendChild(e); setTimeout(()=>e.remove(),1400) }
// зј–иҫ‘зүҲпјҡжӢ–жӢҪзғӯзӮ№еҫ®и°ғдҪҚзҪ®пјҲжңӘжӢ–еҠЁ=зӮ№еҮ»жү“ејҖпјү
let hsDrag=null
function startHsDrag(e, hs){
  e.stopPropagation()
  hsDrag={ hs, moved:false, sx:e.clientX, sy:e.clientY }
  controls.enabled=false
  const ray=new THREE.Raycaster(), m2=new THREE.Vector2()
  const move=ev=>{
    if(!hsDrag) return
    if(Math.abs(ev.clientX-hsDrag.sx)+Math.abs(ev.clientY-hsDrag.sy)>4) hsDrag.moved=true
    if(!hsDrag.moved || !model) return
    m2.set(ev.clientX/innerWidth*2-1, -(ev.clientY/innerHeight)*2+1)
    ray.setFromCamera(m2,camera); const hit=ray.intersectObject(model,true)[0]; if(!hit) return
    hs.data.position=[+hit.point.x.toFixed(3),+hit.point.y.toFixed(3),+hit.point.z.toFixed(3)]
    hs.anchor.position.copy(model.worldToLocal(hit.point.clone()))
  }
  const up=()=>{
    removeEventListener('pointermove',move); removeEventListener('pointerup',up)
    controls.enabled=true
    const dragged = hsDrag && hsDrag.moved; hsDrag=null
    if(!dragged) openHotspot(hs.data, hs.el)              // жІЎжӢ–еҠЁ = зӮ№еҮ» = жү“ејҖ
    else if(window.__edRefresh) window.__edRefresh()      // жӢ–е®ҢеҲ·ж–°зј–иҫ‘еҷЁйҮҢзҡ„дҪҚзҪ®ж•°еӯ—
  }
  addEventListener('pointermove',move); addEventListener('pointerup',up)
}
function wireCanvasAdd(){ const ray=new THREE.Raycaster(), m2=new THREE.Vector2()
  $('scene').addEventListener('click', e=>{ if(!e.shiftKey||!model) return
    m2.x=e.clientX/innerWidth*2-1; m2.y=-(e.clientY/innerHeight)*2+1
    ray.setFromCamera(m2,camera); const hit=ray.intersectObject(model,true)[0]; if(!hit) return
    const w=hit.point // жҳҫзӨәз©әй—ҙдё–з•Ңеқҗж ҮпјҲдёҺ config дёҖиҮҙпјү
    cfg.hotspots=cfg.hotspots||[]
    cfg.hotspots.push({ id:'h'+(cfg.hotspots.length+1), position:[+w.x.toFixed(3),+w.y.toFixed(3),+w.z.toFixed(3)],
      i18n:{ zh:{title:'ж–°зғӯзӮ№',content:'пјҲеҫ…еЎ«еҶҷпјү'}, en:{title:'New',content:'(todo)'} }, cameraFocus:{distance:+camera.position.distanceTo(controls.target).toFixed(2),duration:800} })
    buildHotspots(); renderEditor() }) }

// еҜјеҮәгҖҢд»…и§ӮзңӢзүҲгҖҚпјҡжҠ“еҸ–жң¬ж–Үд»¶жәҗз ҒпјҢеү”йҷӨдёүж®өзј–иҫ‘еҷЁж Үи®°еҢәпјҲCSS/HTML/JSпјүпјҢз”ҹжҲҗжӣҙиҪ»жӣҙе®үе…Ёзҡ„еүҚеҸ°ж–Үд»¶
async function exportViewerOnly(){
  try{
    let src = await (await fetch('player.html',{cache:'no-cache'})).text()
    src = src.replace(/[ \t]*\/\* EDITOR-CSS-START[\s\S]*?\/\* EDITOR-CSS-END \*\/\n?/, '')
             .replace(/[ \t]*<!-- EDITOR-HTML-START[\s\S]*?<!-- EDITOR-HTML-END -->\n?/, '')
             .replace(/[ \t]*\/\* EDITOR-JS-START[\s\S]*?\/\* EDITOR-JS-END \*\/\n?/, '')
    const blob = new Blob([src], {type:'text/html'})
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='player.view.html'; a.click()
    flash('е·ІеҜјеҮәд»…и§ӮзңӢзүҲ player.view.html')
  }catch(e){ alert('еҜјеҮәд»…и§ӮзңӢзүҲеӨұиҙҘпјҡ'+e.message) }
}
