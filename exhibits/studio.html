<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D 鉴赏工作台</title>
<link rel="icon" href="data:," />
<style>
  :root { --gold:#c8a86a; --ink:#0f1118; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { background:var(--ink); color:#eef0f5; min-height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif; }
  body { padding:32px clamp(16px,4vw,48px) 64px; }
  a { color:inherit; text-decoration:none; }

  .head { display:flex; flex-wrap:wrap; align-items:flex-end; gap:12px 24px; margin-bottom:6px; }
  .head h1 { font-size:22px; font-weight:700; letter-spacing:.5px; }
  .head .sub { font-size:13px; color:rgba(230,234,245,.6); }
  .head .count { margin-left:auto; font-size:13px; color:var(--gold); align-self:center; }
  .toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin:18px 0 24px; }
  .search { flex:1; min-width:200px; max-width:360px; padding:9px 14px; border:1px solid rgba(255,255,255,.14);
    border-radius:10px; background:rgba(255,255,255,.05); color:#eef0f5; font-size:13px; font-family:inherit; }
  .search:focus { outline:none; border-color:var(--gold); }

  .grid { display:grid; gap:18px; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); }
  .card { border:1px solid rgba(255,255,255,.1); border-radius:16px; overflow:hidden; background:rgba(255,255,255,.03);
    display:flex; flex-direction:column; transition:.2s; }
  .card:hover { border-color:rgba(200,168,106,.5); transform:translateY(-3px); box-shadow:0 14px 34px rgba(0,0,0,.45); }
  .thumb { aspect-ratio:16/10; background:#14161f center/cover no-repeat;
    background-image:radial-gradient(120% 90% at 50% 30%, #1c2030, #0b0d14); position:relative; }
  .thumb .ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:34px; opacity:.5; }
  .body { padding:14px 16px 16px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .title { font-size:15px; font-weight:700; color:#f4e6c8; letter-spacing:.3px; }
  .subtitle { font-size:12px; color:rgba(230,234,245,.62); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:34px; }
  .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
  .badge { font-size:11px; padding:2px 9px; border-radius:999px; background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.1); color:rgba(230,234,245,.8); }
  .badge.warn { color:#e6a23c; border-color:rgba(230,162,60,.35); background:rgba(230,162,60,.1); }
  .dir { font-size:11px; color:rgba(230,234,245,.4); font-family:ui-monospace,monospace; word-break:break-all; }
  .acts { display:flex; gap:8px; margin-top:auto; padding-top:6px; }
  .btn { flex:1; text-align:center; padding:9px 8px; border-radius:9px; font-size:13px; cursor:pointer; transition:.18s;
    border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.06); color:#eef0f5; }
  .btn:hover { background:rgba(255,255,255,.12); }
  .btn.edit { border-color:var(--gold); background:rgba(200,168,106,.16); color:#f4e6c8; }
  .btn.edit:hover { background:rgba(200,168,106,.28); }

  .empty { padding:60px 20px; text-align:center; color:rgba(230,234,245,.55); font-size:14px; line-height:1.9; }
  .foot { margin-top:36px; padding-top:20px; border-top:1px solid rgba(255,255,255,.08);
    font-size:12.5px; color:rgba(230,234,245,.5); line-height:1.9; }
  .foot code { background:rgba(255,255,255,.07); padding:1px 6px; border-radius:5px; font-size:12px; }
  .foot b { color:rgba(230,234,245,.75); }
</style>
</head>
<body>
  <div class="head">
    <h1 id="s-title">3D 鉴赏工作台</h1>
    <span class="sub" id="s-sub"></span>
    <span class="count" id="s-count"></span>
  </div>
  <div class="toolbar">
    <input class="search" id="search" placeholder="搜索展品名称 / 目录…" autocomplete="off">
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden></div>

  <div class="foot">
    <div><b>怎么用</b>：点卡片「编辑」直接进该展品编辑器（无需手打 URL），「预览」看观看版。</div>
    <div><b>新增展品</b>：复制任一 <code>craft-XXX/</code> 文件夹改内容 → 在 <code>manifest.json</code> 的 <code>exhibits</code> 数组里加一行目录名即可出现在此。</div>
    <div><b>注意</b>：本页是开发方内部工具，<b>请勿随公开展包一起部署</b>（放本地或受保护路径）。</div>
  </div>

<script>
const $ = id => document.getElementById(id)
let cards = []

async function load() {
  let mani
  try { mani = await (await fetch('manifest.json', {cache:'no-cache'})).json() }
  catch(e){ return showEmpty('读取 manifest.json 失败：' + e.message) }
  $('s-title').textContent = mani.title || '3D 鉴赏工作台'
  $('s-sub').textContent = mani.subtitle || ''
  document.title = mani.title || '3D 鉴赏工作台'
  const list = (mani.exhibits || []).map(e => typeof e === 'string' ? { dir:e } : e)
  if (!list.length) return showEmpty('manifest.json 里还没有展品。复制一个 craft-XXX/ 文件夹并把目录名加进 exhibits 数组。')

  const results = await Promise.all(list.map(async e => {
    const dir = e.dir.replace(/\/$/, '')
    try {
      const cfg = await (await fetch(`${dir}/config.json`, {cache:'no-cache'})).json()
      return { dir, cfg, override:e }
    } catch(err) { return { dir, error:err.message, override:e } }
  }))
  cards = results.map(render)
  $('grid').append(...cards.map(c => c.el))
  $('s-count').textContent = `${results.length} 件展品`
  $('search').addEventListener('input', filter)
}

function render(r) {
  const el = document.createElement('div'); el.className = 'card'
  const zh = r.cfg?.i18n?.zh || {}
  const title = r.override?.title || zh.title || r.dir
  const subtitle = r.error ? ('⚠️ 读取失败：' + r.error) : (zh.subtitle || '')
  const poster = r.cfg?.assets?.poster ? `${r.dir}/${r.cfg.assets.poster}` : ''
  const hsN = (r.cfg?.hotspots || []).length
  const auN = (r.cfg?.audio || []).length
  const hasPano = !!(r.cfg?.assets?.panorama)

  const badges = r.error ? '' : `
    <span class="badge">热点 ${hsN}</span>
    <span class="badge">语音 ${auN}</span>
    ${hasPano ? '<span class="badge">全景</span>' : '<span class="badge warn">无全景</span>'}`

  el.innerHTML = `
    <a class="thumb" href="${r.dir}/index.html" target="_blank" rel="noopener"
       style="${poster ? `background-image:url('${poster}')` : ''}">
       ${poster ? '' : '<span class="ph">🏺</span>'}</a>
    <div class="body">
      <div class="title">${esc(title)}</div>
      <div class="subtitle">${esc(subtitle)}</div>
      <div class="badges">${badges}</div>
      <div class="dir">${esc(r.dir)}/</div>
      <div class="acts">
        <a class="btn" href="${r.dir}/index.html" target="_blank" rel="noopener">预览</a>
        <a class="btn edit" href="${r.dir}/index.html?mode=edit" target="_blank" rel="noopener">编辑</a>
      </div>
    </div>`
  return { el, key: (title + ' ' + r.dir).toLowerCase() }
}

function filter() {
  const q = $('search').value.trim().toLowerCase()
  let shown = 0
  cards.forEach(c => { const ok = !q || c.key.includes(q); c.el.hidden = !ok; if (ok) shown++ })
  $('empty').hidden = shown > 0
  if (!shown) { $('empty').textContent = '没有匹配「' + $('search').value + '」的展品。'; $('empty').hidden = false }
}
function showEmpty(msg){ $('empty').textContent = msg; $('empty').hidden = false; $('grid').hidden = true }
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])) }

load()
</script>
</body>
</html>
