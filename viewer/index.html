<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>立体鉴赏</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <!-- 顶部标题栏 -->
      <header id="topbar" class="topbar" hidden>
        <div class="topbar-name" id="craft-name"></div>
        <div class="topbar-sub" id="craft-sub"></div>
      </header>

      <!-- 操作提示 -->
      <div id="hint" class="hint" hidden>拖动旋转 · 双指缩放</div>

      <!-- 底部控制栏 -->
      <div id="hud" class="hud" hidden>
        <div class="hud-envs" id="hud-envs"></div>
        <div class="hud-actions">
          <button class="hud-btn" id="btn-rotate" type="button">
            <span class="hud-ic" id="ic-rotate">↻</span><span>自动旋转</span>
          </button>
          <button class="hud-btn" id="btn-reset" type="button">
            <span class="hud-ic">⤢</span><span>重置视角</span>
          </button>
        </div>
      </div>

      <!-- 加载遮罩 -->
      <div id="loading" class="overlay">
        <div class="poster" id="poster"></div>
        <div class="overlay-inner">
          <div class="spinner"></div>
          <div class="load-text" id="load-text">正在加载模型…</div>
          <div class="load-bar"><i id="load-bar-fill"></i></div>
        </div>
      </div>

      <!-- 错误 / 降级 -->
      <div id="error" class="overlay error" hidden>
        <div class="err-card">
          <div class="err-icon">!</div>
          <div class="err-text" id="err-text">加载失败</div>
          <button class="err-retry" id="err-retry" type="button" hidden>重新加载</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
